[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

; Konfigurasi Flash & PSRAM (sesuaikan dengan board Anda)
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.flash_freq = 80MHz
board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

; ===== KONFIGURASI UTAMA UNTUK USB CDC =====
; Flag ini WAJIB ada untuk mengaktifkan USB CDC sebagai serial port utama
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

; GANTI 'COMx' dengan port yang Anda temukan di Device Manager, misalnya COM5
upload_port = COM4
monitor_port = COM4

; Kecepatan upload dan monitor
upload_speed = 921600
monitor_speed = 921600

; Library dependencies (sesuaikan dengan kebutuhan proyek Anda)
lib_deps = 
    espressif/esp32-camera @ ^2.0.4
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/eloquentarduino/EloquentTinyML.git
    bblanchon/ArduinoJson @ ^7.0.0

; ===== KONFIGURASI TAMBAHAN (opsional) =====
; --- SOLUSI: Serial Port Issues ---
monitor_rts = 0
monitor_dtr = 0
