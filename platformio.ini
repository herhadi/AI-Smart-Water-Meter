[env:esp32-s3-devkitc-1-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Konfigurasi Flash 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = opi

; Konfigurasi PSRAM 8MB OPI (Octal SPI)
board_build.arduino.memory_type = opi_opi
build_flags = 
    -D BOARD_HAS_PSRAM

; Skema Partisi untuk Flash 16MB
; Kita pakai default 16MB yang sudah disediakan framework espressif32
board_build.partitions = default_16MB.csv

; Ganti dengan nama port yang Anda temukan di langkah 1
upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101

; Monitor Speed
monitor_speed = 115200

lib_deps = 
    espressif/esp32-camera @ ^2.0.4
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/eloquentarduino/EloquentTinyML.git
    bblanchon/ArduinoJson @ ^7.0.0